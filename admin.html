<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #071120;
            color: #fff;
            padding: 30px;
        }

        h1 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 40px;
        }

        h2 {
            margin: 40px 0 20px;
            color: #ff9933;
        }

        .login-box {
            max-width: 420px;
            margin: 80px auto;
            background: #101d31;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .login-box h2 {
            margin: 0 0 20px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #071120;
            color: #fff;
            font-size: 16px;
        }

        .login-box button,
        .search-box button,
        .export-btn,
        .logout-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #0056ff, #ff3131, #ff9933);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        .login-box button {
            width: 100%;
        }

        .top-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .search-box {
            margin: 0 auto 25px;
            max-width: 700px;
            display: flex;
            gap: 12px;
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #101d31;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #101d31;
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: #0d6efd;
            padding: 14px;
            text-align: left;
            white-space: nowrap;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            white-space: nowrap;
        }

        tr:hover {
            background: #162742;
        }

        a {
            color: #00d9ff;
            text-decoration: none;
            font-weight: bold;
        }

        table button {
            background: #ff3131;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .status-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .status-New {
            background: #0d6efd;
            color: #fff;
        }

        .status-Contacted {
            background: #ff9933;
            color: #000;
        }

        .status-Approved {
            background: #00c853;
            color: #fff;
        }

        .status-Rejected {
            background: #ff3131;
            color: #fff;
        }

        .hidden {
            display: none;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

    <div id="loginSection" class="login-box">
        <h2>Admin Login</h2>
        <input type="text" id="adminUsername" placeholder="Username">
        <input type="password" id="adminPassword" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
    </div>

    <div id="dashboardSection" class="hidden">
        <h1>Immigration Admin Dashboard</h1>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by name, phone, email, service, country...">
            <button onclick="filterDashboard()">Search</button>
        </div>

        <div class="top-actions">
            <button class="export-btn" onclick="exportToExcel()">Export All Leads</button>
            <button class="logout-btn" onclick="logoutAdmin()">Logout</button>
        </div>

        <div id="dashboard"></div>
    </div>

    <script>
        const BASE_URL = "https://immigration-crm-website-production.up.railway.app";
        let allDashboardData = {
            inquiries: [],
            applications: [],
            contacts: [],
            eligibilities: [],
            chatLeads: []
        };

        function getAdminToken() {
            return localStorage.getItem("adminToken");
        }

        function showDashboard() {
            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("dashboardSection").classList.remove("hidden");
            loadDashboard();
        }

        function showLogin() {
            document.getElementById("loginSection").classList.remove("hidden");
            document.getElementById("dashboardSection").classList.add("hidden");
        }

        async function adminLogin() {
            const username = document.getElementById("adminUsername").value.trim();
            const password = document.getElementById("adminPassword").value.trim();

            if (!username || !password) {
                alert("Please enter username and password");
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/api/admin/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem("adminToken", data.token);
                    showDashboard();
                } else {
                    alert(data.message || "Login failed");
                }
            } catch (error) {
                alert("Server error during login");
                console.error(error);
            }
        }

        function logoutAdmin() {
            localStorage.removeItem("adminToken");
            showLogin();
        }

        async function deleteLead(title, id) {
            const typeMap = {
                "Inquiries": "inquiries",
                "Applications": "applications",
                "Contacts": "contacts",
                "Eligibilities": "eligibilities",
                "Chat Leads": "chatLeads"
            };

            const type = typeMap[title];

            if (!confirm("Are you sure you want to delete this lead?")) return;

            try {
                const response = await fetch(`${BASE_URL}/api/admin/delete/${type}/${id}`, {
                    method: "DELETE",
                    headers: {
                        Authorization: `Bearer ${getAdminToken()}`
                    }
                });

                const data = await response.json();

                if (data.success) {
                    alert("Lead deleted successfully");
                    loadDashboard();
                } else {
                    alert(data.message || "Delete failed");
                }
            } catch (error) {
                alert("Server error while deleting lead");
                console.error(error);
            }
        }

        async function updateStatus(title, id, status) {
            const typeMap = {
                "Inquiries": "inquiries",
                "Applications": "applications",
                "Contacts": "contacts",
                "Eligibilities": "eligibilities",
                "Chat Leads": "chatLeads"
            };

            const type = typeMap[title];

            try {
                const response = await fetch(`${BASE_URL}/api/admin/status/${type}/${id}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${getAdminToken()}`
                    },
                    body: JSON.stringify({ status })
                });

                const data = await response.json();

                if (data.success) {
                    alert("Status updated successfully");
                    loadDashboard();
                } else {
                    alert(data.message || "Status update failed");
                }

            } catch (error) {
                alert("Server error while updating status");
                console.error(error);
            }
        }

        function createTable(title, items) {
            if (!items || items.length === 0) return "";

            const headers = Object.keys(items[0]).filter(key => key !== "__v");

            let html = `
                <h2>${title}</h2>
                <div class="table-wrapper">
                    <table>
                        <tr>
                            ${headers.map(h => `<th>${h}</th>`).join("")}
                            <th>Action</th>
                        </tr>
            `;

            items.forEach(item => {
                html += "<tr>";

                headers.forEach(key => {

                    if (key === "status") {
                        const currentStatus = item[key] || "New";

                        html += `
                            <td>
                                <select class="status-select status-${currentStatus}" onchange="updateStatus('${title}', '${item._id}', this.value)">
                                    <option value="New" ${currentStatus === "New" ? "selected" : ""}>New</option>
                                    <option value="Contacted" ${currentStatus === "Contacted" ? "selected" : ""}>Contacted</option>
                                    <option value="Approved" ${currentStatus === "Approved" ? "selected" : ""}>Approved</option>
                                    <option value="Rejected" ${currentStatus === "Rejected" ? "selected" : ""}>Rejected</option>
                                </select>
                            </td>
                        `;
                    }

                    else if (key === "cv" && item[key]) {
                        const cvPath = item[key].replace(/\\/g, "/");
                        const cvUrl = `${BASE_URL}/${cvPath}`;

                        html += `
                            <td>
                                <a href="${cvUrl}" target="_blank" rel="noopener noreferrer">
                                    View CV
                                </a>
                            </td>
                        `;
                    }

                    else {
                        html += `<td>${item[key] || ""}</td>`;
                    }

                });

                html += `
                    <td>
                        <button onclick="deleteLead('${title}', '${item._id}')">
                            Delete
                        </button>
                    </td>
                `;

                html += "</tr>";
            });

            html += `
                    </table>
                </div>
            `;

            return html;
        }

        function renderDashboard(data) {
            const dashboard = document.getElementById("dashboard");

            dashboard.innerHTML =
                createTable("Inquiries", data.inquiries) +
                createTable("Applications", data.applications) +
                createTable("Contacts", data.contacts) +
                createTable("Eligibilities", data.eligibilities) +
                createTable("Chat Leads", data.chatLeads);

            if (dashboard.innerHTML.trim() === "") {
                dashboard.innerHTML = "<p style='text-align:center;color:#ff9933;font-size:22px;'>No matching records found</p>";
            }
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`${BASE_URL}/api/admin/leads`, {
                    headers: {
                        Authorization: `Bearer ${getAdminToken()}`
                    }
                });

                const data = await response.json();

                if (response.status === 401) {
                    alert("Session expired. Please login again.");
                    logoutAdmin();
                    return;
                }

                allDashboardData = {
                    inquiries: data.inquiries || [],
                    applications: data.applications || [],
                    contacts: data.contacts || [],
                    eligibilities: data.eligibilities || [],
                    chatLeads: data.chatLeads || []
                };

                renderDashboard(allDashboardData);
            } catch (error) {
                document.getElementById("dashboard").innerHTML =
                    "<p style='text-align:center;color:#ff3131;font-size:22px;'>Failed to load dashboard data</p>";
                console.error(error);
            }
        }

        function filterDashboard() {
            const searchValue = document.getElementById("searchInput").value.toLowerCase().trim();

            if (searchValue === "") {
                renderDashboard(allDashboardData);
                return;
            }

            const filteredData = {
                inquiries: allDashboardData.inquiries.filter(item =>
                    JSON.stringify(item).toLowerCase().includes(searchValue)
                ),
                applications: allDashboardData.applications.filter(item =>
                    JSON.stringify(item).toLowerCase().includes(searchValue)
                ),
                contacts: allDashboardData.contacts.filter(item =>
                    JSON.stringify(item).toLowerCase().includes(searchValue)
                ),
                eligibilities: allDashboardData.eligibilities.filter(item =>
                    JSON.stringify(item).toLowerCase().includes(searchValue)
                ),
                chatLeads: allDashboardData.chatLeads.filter(item =>
                    JSON.stringify(item).toLowerCase().includes(searchValue)
                )
            };

            renderDashboard(filteredData);
        }

        function exportToExcel() {
            const workbook = XLSX.utils.book_new();

            const sections = {
                Inquiries: allDashboardData.inquiries,
                Applications: allDashboardData.applications,
                Contacts: allDashboardData.contacts,
                Eligibilities: allDashboardData.eligibilities,
                ChatLeads: allDashboardData.chatLeads
            };

            Object.keys(sections).forEach(sectionName => {
                const data = sections[sectionName];

                if (data && data.length > 0) {
                    const cleanData = data.map(item => {
                        const copy = { ...item };
                        delete copy.__v;
                        return copy;
                    });

                    const worksheet = XLSX.utils.json_to_sheet(cleanData);
                    XLSX.utils.book_append_sheet(workbook, worksheet, sectionName);
                }
            });

            XLSX.writeFile(workbook, "immigration-leads.xlsx");
        }

        if (getAdminToken()) {
            showDashboard();
        } else {
            showLogin();
        }
    </script>

</body>

</html>
